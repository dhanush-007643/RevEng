apiVersion: apps/v1
kind: Deployment

metadata:
  name: student-app-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: student-app

  template:
    metadata:
      labels:
        app: student-app

    spec:
      containers:
      - name: student-app
        image: dhaanush19/student-app:v1

        ports:
        - containerPort: 5000