<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <span class="navbar-brand mb-0 h1">
      Student Management System
    </span>
  </div>
</nav>

<div class="container mt-4">

  <div class="row g-3">

    <div class="col-md-4">
      <div class="card stat-card">
        <div class="card-body">
          <h5>Total Students</h5>
          <h2>{{ students|length }}</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card stat-card">
        <div class="card-body">
          <h5>Departments</h5>
          <h2>3</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card stat-card">
        <div class="card-body">
          <h5>Status</h5>
          <h2>Active</h2>
        </div>
      </div>
    </div>

  </div>

  <div class="card mt-4">
    <div class="card-header">
      Add Student
    </div>

    <div class="card-body">

      <form>
        <div class="row">

          <div class="col-md-5">
            <input type="text"
                   class="form-control"
                   placeholder="Student Name">
          </div>

          <div class="col-md-5">
            <input type="text"
                   class="form-control"
                   placeholder="Department">
          </div>

          <div class="col-md-2">
            <button class="btn btn-primary w-100">
              Add
            </button>
          </div>

        </div>
      </form>

    </div>
  </div>

  <div class="card mt-4">
    <div class="card-header">
      Student Records
    </div>

    <div class="card-body">

      <table class="table table-hover">

        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
          </tr>
        </thead>

        <tbody>

          {% for student in students %}

          <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.dept }}</td>
          </tr>

          {% endfor %}

        </tbody>

      </table>

    </div>
  </div>

</div>

</body>
</html>
